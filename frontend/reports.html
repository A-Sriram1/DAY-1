<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Used Car ETL Dashboard</title>
    <meta name="description" content="Analytics and charts for used car data.">
    <meta name="theme-color" content="#2563EB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CarETL">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-car-side"></i>
                <h1>CarETL Dashboard</h1>
            </div>
            <nav class="nav-links">
                <a href="index.html">Dashboard</a>
                <a href="reports.html" class="active">Reports</a>
                <a href="settings.html">Settings</a>
                <button id="themeToggle" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
            </nav>
        </header>

        <main class="main-content">
            <div class="header-actions">
                <h2>Reports & Analytics</h2>
                <button class="btn btn-outline" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Report</button>
            </div>

            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-database"></i></div>
                    <div class="stat-info">
                        <h3>Clean Records</h3>
                        <p id="cleanRecords">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                    <div class="stat-info">
                        <h3>Dirty Records Detected</h3>
                        <p id="dirtyRecords">0</p>
                    </div>
                </div>
            </div>

            <!-- Charts Grid -->
            <div class="charts-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                <div class="glass-card" style="margin-bottom: 0;">
                    <h3>Brand Distribution</h3>
                    <canvas id="brandChart"></canvas>
                </div>
                <div class="glass-card" style="margin-bottom: 0;">
                    <h3>Fuel Type Distribution</h3>
                    <canvas id="fuelChart"></canvas>
                </div>
            </div>

            <!-- Price Analysis -->
            <div class="glass-card">
                <h3>Average Price by Year</h3>
                <canvas id="yearChart" style="max-height: 300px;"></canvas>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2024 Used Car ETL Dashboard. Built for Data Analytics.</p>
        </footer>
    </div>
    
    <script src="js/reports.js"></script>
    <script>
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.body.removeAttribute('data-theme');
                document.getElementById('themeToggle').innerHTML = '<i class="fa-solid fa-moon"></i>';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeToggle').innerHTML = '<i class="fa-solid fa-sun"></i>';
            }
        }
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.error);
        }
    </script>
</body>
</html>
